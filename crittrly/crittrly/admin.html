<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Crittrly</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=4">
<style>
body{background:#f0ede8}
.atb{background:var(--ink);border-bottom:2px solid var(--orange);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:58px;position:sticky;top:0;z-index:100}
.atb-logo{font-family:'Unbounded',sans-serif;font-size:1rem;font-weight:900;color:#fff;display:flex;align-items:center;gap:8px;text-decoration:none}
.atb-badge{background:var(--orange);color:#fff;border-radius:4px;padding:2px 8px;font-size:.6rem;font-weight:800;letter-spacing:.06em}
.atb-links{display:flex;align-items:center;gap:16px}
.atb-links a{color:rgba(255,255,255,.55);font-size:.8rem;text-decoration:none;transition:color .2s}
.atb-links a:hover{color:var(--orange)}
.img-upload-btn{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;border-radius:50px;padding:9px 18px;cursor:pointer;font-size:.8rem;font-weight:600;border:none;transition:background .2s}
.img-upload-btn:hover{background:#333}
.img-preview-box{width:110px;height:110px;border-radius:12px;border:2px dashed var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;position:relative}
.img-preview-box img{width:100%;height:100%;object-fit:cover}
.fulfil-step{background:var(--surface);border-radius:12px;padding:20px 16px;text-align:center}
.fulfil-num{width:34px;height:34px;border-radius:50%;background:var(--orange);color:#fff;font-family:'Unbounded',sans-serif;font-size:.72rem;font-weight:900;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.fulfil-step h4{font-family:'Unbounded',sans-serif;font-size:.7rem;font-weight:800;color:var(--ink);margin-bottom:6px}
.fulfil-step p{font-size:.75rem;color:var(--muted);line-height:1.55}
.order-row-pending td{background:#fffbf0}
.copy-btn{background:var(--surface2);border:none;border-radius:6px;padding:3px 8px;font-size:.68rem;cursor:pointer;transition:background .2s;margin-left:4px}
.copy-btn:hover{background:var(--orange);color:#fff}
</style>
</head>
<body class="admin-body">

<div class="atb">
  <a href="index.html" class="atb-logo">
    <div class="logo-dot"></div>Crittrly
    <span class="atb-badge">ADMIN</span>
  </a>
  <div class="atb-links">
    <a href="index.html">← View Store</a>
    <a href="shop.html" target="_blank">Shop</a>
    <span style="color:rgba(255,255,255,.2)">|</span>
    <span style="color:rgba(255,255,255,.4);font-size:.78rem">Admin</span>
  </div>
</div>

<div class="admin-layout">
  <nav class="admin-sidebar">
    <div class="admin-sidebar-logo">📋 Admin Panel</div>
    <div class="admin-nav-item active" onclick="nav('dashboard')" id="nav-dashboard"><span class="nav-icon">📊</span> Dashboard</div>
    <div class="admin-nav-item" onclick="nav('products')" id="nav-products"><span class="nav-icon">📦</span> Products</div>
    <div class="admin-nav-item" onclick="nav('inventory')" id="nav-inventory"><span class="nav-icon">🏷️</span> Inventory</div>
    <div class="admin-nav-item" onclick="nav('orders')" id="nav-orders"><span class="nav-icon">🛒</span> Orders</div>
    <div class="admin-nav-item" onclick="nav('fulfillment')" id="nav-fulfillment"><span class="nav-icon">🚚</span> Fulfillment</div>
    <div class="admin-nav-item" onclick="nav('customers')" id="nav-customers"><span class="nav-icon">👥</span> Customers</div>
    <div class="admin-nav-item" onclick="nav('settings')" id="nav-settings"><span class="nav-icon">⚙️</span> Settings</div>
    <div style="margin-top:auto;padding:20px">
      <a href="index.html" style="color:rgba(255,255,255,.3);font-size:.78rem;text-decoration:none" onmouseenter="this.style.color='var(--orange)'" onmouseleave="this.style.color='rgba(255,255,255,.3)'">← Back to Store</a>
    </div>
  </nav>
  <main class="admin-main" id="adminMain"></main>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-wrap" id="productModal">
  <div class="modal-box" style="width:700px">
    <div class="modal-header">
      <h3 id="modalTitle">Add Product</h3>
      <button class="close-btn" onclick="closeModal('productModal')" style="background:var(--surface);color:var(--ink);border:1.5px solid var(--border)">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<!-- ORDER MODAL -->
<div class="modal-wrap" id="orderModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="orderModalTitle">Order Details</h3>
      <button class="close-btn" onclick="closeModal('orderModal')" style="background:var(--surface);color:var(--ink);border:1.5px solid var(--border)">✕</button>
    </div>
    <div id="orderModalBody"></div>
  </div>
</div>

<div class="toast" id="toast"><span class="toast-dot" id="toastDot"></span><span id="toastMsg"></span></div>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script>
'use strict';
const ADMIN_KEY='crittrly-admin-2025';
const SERVER=(function(){if(window.location.port==='3000')return 'http://'+window.location.hostname+':3000';return window.location.origin;})();
async function apiGet(p){const r=await fetch(SERVER+p,{headers:{'X-Admin-Key':ADMIN_KEY}});return r.json();}
async function apiPost(p,d){const r=await fetch(SERVER+p,{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Key':ADMIN_KEY},body:JSON.stringify(d)});return r.json();}
async function apiPut(p,d){const r=await fetch(SERVER+p,{method:'PUT',headers:{'Content-Type':'application/json','X-Admin-Key':ADMIN_KEY},body:JSON.stringify(d)});return r.json();}
let _serverUp=false;
async function checkAdminServer(){try{const d=await apiGet('/api/status');_serverUp=d.result===true;}catch{_serverUp=false;}return _serverUp;}
// retryFulfill removed — manual fulfillment only
async function syncTracking(){if(!_serverUp){showToast('Server not connected','error');return;}const r=await apiPost('/api/admin/sync-tracking',{});showToast(r.result?'Tracking sync started':'Error: '+r.message,r.result?'':'error');}


// ─── UTILS ────────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ea(s){ return String(s||'').replace(/"/g,'&quot;'); }
function set(id,h){ var el=document.getElementById(id); if(el) el.innerHTML=h; }
function val(id){ var el=document.getElementById(id); return el?el.value:''; }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

var editingId=null, selectedEmoji='📦';

// ─── NAV ──────────────────────────────────────────────────────────────────────
function nav(page){
  document.querySelectorAll('.admin-nav-item').forEach(function(n){ n.classList.remove('active'); });
  var navEl=document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');
  set('adminMain','<div style="padding:60px;text-align:center;color:var(--muted);">Loading…</div>');
  setTimeout(function(){
    if(page==='dashboard') renderDashboard();
    else if(page==='products') renderProducts();
    else if(page==='inventory') renderInventory();
    else if(page==='orders'){if(_serverUp)renderServerOrders();else renderLocalOrders();}
    else if(page==='fulfillment') renderFulfillment();
    else if(page==='customers') renderCustomers();
    else if(page==='settings') renderSettings();
  },40);
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard(){
  var prods=getProducts(), ords=getOrders();
  var rev=ords.reduce(function(s,o){return s+o.total;},0);
  var pending=ords.filter(function(o){return o.status==='pending'||o.status==='processing';}).length;
  var outStock=prods.filter(function(p){return p.stock===0;}).length;
  var lowStock=prods.filter(function(p){return p.stock>0&&p.stock<=10;}).length;

  var recentRows=ords.slice(0,5).map(function(o){
    return '<tr><td><strong>'+esc(o.id)+'</strong></td><td>'+esc(o.customer)+'</td><td><strong>'+formatPrice(o.total)+'</strong></td>'
      +'<td><span class="order-status '+o.status+'">'+o.status+'</span></td>'
      +'<td><button class="tbl-btn" onclick="openOrderModal(\''+ea(o.id)+'\')">View</button></td></tr>';
  }).join('');

  var alertRows=prods.filter(function(p){return p.stock<=10;}).sort(function(a,b){return a.stock-b.stock;}).slice(0,6).map(function(p){
    var thumb=p.image?'<img src="'+ea(p.image)+'" style="width:100%;height:100%;object-fit:cover;">':esc(p.emoji);
    return '<tr><td><div class="product-thumb-row"><div class="product-thumb" style="overflow:hidden;padding:0;">'+thumb+'</div>'
      +'<div class="product-thumb-name">'+esc(p.name.substring(0,28))+'</div></div></td>'
      +'<td><strong>'+p.stock+'</strong></td>'
      +'<td><span class="stock-badge '+(p.stock===0?'out':p.stock<=5?'low':'in')+'">'+(p.stock===0?'Out':'Low')+'</span></td>'
      +'<td><button class="tbl-btn" onclick="quickStock(\''+ea(p.id)+'\')">Restock</button></td></tr>';
  }).join('');

  document.getElementById('adminMain').innerHTML=
    '<h1 class="admin-page-title">Dashboard</h1>'
    +'<div class="admin-stats">'
      +'<div class="admin-stat-card"><div class="asc-label">Total Revenue</div><div class="asc-num">'+formatPrice(rev)+'</div><div class="asc-trend up">↑ all time</div></div>'
      +'<div class="admin-stat-card"><div class="asc-label">Total Orders</div><div class="asc-num">'+ords.length+'</div><div class="asc-trend '+(pending>0?'down':'up')+'">'+(pending>0?pending+' need action':'✓ all clear')+'</div></div>'
      +'<div class="admin-stat-card"><div class="asc-label">Active Products</div><div class="asc-num">'+prods.filter(function(p){return p.stock>0;}).length+'</div><div class="asc-trend '+(outStock>0?'down':'up')+'">'+(outStock>0?outStock+' out of stock':'✓ all stocked')+'</div></div>'
      +'<div class="admin-stat-card"><div class="asc-label">Low Stock Items</div><div class="asc-num">'+lowStock+'</div><div class="asc-trend '+(lowStock>0?'down':'up')+'">'+(lowStock>0?'need restocking':'✓ all good')+'</div></div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">'
      +'<div class="admin-card"><div class="admin-card-header"><h3>Recent Orders</h3><button class="btn-admin" onclick="nav(\'orders\')">View All</button></div>'
        +'<table class="admin-table"><thead><tr><th>Order</th><th>Customer</th><th>Amount</th><th>Status</th><th></th></tr></thead><tbody>'+recentRows+'</tbody></table></div>'
      +'<div class="admin-card"><div class="admin-card-header"><h3>Stock Alerts</h3><button class="btn-admin" onclick="nav(\'inventory\')">Manage</button></div>'
        +'<table class="admin-table"><thead><tr><th>Product</th><th>Stock</th><th>Status</th><th></th></tr></thead><tbody>'+alertRows+'</tbody></table></div>'
    +'</div>'
    +'<div class="admin-card" style="margin-top:0"><div class="admin-card-header"><h3>Quick Actions</h3></div>'
      +'<div class="admin-card-body" style="display:flex;gap:10px;flex-wrap:wrap">'
        +'<button class="btn-admin" onclick="nav(\'products\');setTimeout(openAddProduct,80)">+ Add Product</button>'
        +'<button class="btn-admin-ghost" onclick="nav(\'orders\')">📋 Orders</button>'
        +'<button class="btn-admin-ghost" onclick="nav(\'fulfillment\')">🚚 Fulfillment Guide</button>'
        +'<button class="btn-admin-ghost" onclick="nav(\'inventory\')">🏷️ Inventory</button>'
        +'<button class="btn-admin-ghost" onclick="nav(\'settings\')">⚙️ Settings</button>'
      +'</div></div>';
}

// ─── PRODUCTS ─────────────────────────────────────────────────────────────────
function renderProducts(){
  var prods=getProducts();
  document.getElementById('adminMain').innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">'
      +'<h1 class="admin-page-title" style="margin-bottom:0">Products</h1>'
      +'<div style="display:flex;gap:10px">'
        +'<input type="text" id="pSearch" placeholder="Search…" oninput="filterProds()" style="padding:9px 16px;border:1.5px solid var(--border);border-radius:50px;font-size:.82rem;outline:none;width:200px">'
        +'<select id="pCat" onchange="filterProds()" style="padding:9px 14px;border:1.5px solid var(--border);border-radius:50px;font-size:.82rem;background:#fff;outline:none">'
          +'<option value="">All Categories</option>'
          +'<option value="dog">Dogs</option><option value="cat">Cats</option><option value="bird">Birds</option>'
          +'<option value="reptile">Reptiles</option><option value="fish">Fish</option><option value="small">Small Pets</option>'
        +'</select>'
        +'<button class="btn-admin" onclick="openAddProduct()">+ Add Product</button>'
      +'</div>'
    +'</div>'
    +'<div class="admin-card"><table class="admin-table"><thead><tr>'
      +'<th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Badge</th><th>SKU</th><th>Actions</th>'
    +'</tr></thead><tbody id="prodBody">'+prodRows(prods)+'</tbody></table></div>';
}

function prodRows(prods){
  return prods.map(function(p){
    var thumb=p.image?'<img src="'+ea(p.image)+'" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display=\'none\'">':esc(p.emoji);
    var origHtml=p.orig?'<br><span style="font-size:.7rem;color:var(--muted);text-decoration:line-through">'+formatPrice(p.orig)+'</span>':'';
    var badgeHtml=p.badge?'<span class="p-badge '+p.badge+'" style="position:static;display:inline-block">'+p.badge+'</span>':'<span style="color:var(--muted)">—</span>';
    return '<tr id="pr-'+p.id+'">'
      +'<td><div class="product-thumb-row"><div class="product-thumb" style="overflow:hidden;padding:0">'+thumb+'</div>'
        +'<div><div class="product-thumb-name">'+esc(p.name)+'</div><div class="product-thumb-cat">'+esc(p.id)+'</div></div></div></td>'
      +'<td style="text-transform:capitalize">'+esc(p.category)+'</td>'
      +'<td><strong>'+formatPrice(p.price)+'</strong>'+origHtml+'</td>'
      +'<td><div style="display:flex;align-items:center;gap:6px"><span class="stock-badge '+(p.stock===0?'out':p.stock<=10?'low':'in')+'">'+p.stock+'</span>'
        +'<button class="tbl-btn" onclick="quickStock(\''+ea(p.id)+'\')">Edit</button></div></td>'
      +'<td>'+badgeHtml+'</td>'
      +'<td><code style="font-size:.68rem;background:var(--surface);padding:2px 6px;border-radius:4px">'+esc(p.cjdSku||'—')+'</code></td>'
      +'<td><div class="table-actions">'
        +'<button class="tbl-btn edit" onclick="openEditProduct(\''+ea(p.id)+'\')">✏️ Edit</button>'
        +'<a href="product.html?id='+ea(p.id)+'" target="_blank" class="tbl-btn">👁️</a>'
        +'<button class="tbl-btn del" onclick="deleteProduct(\''+ea(p.id)+'\')">🗑️</button>'
      +'</div></td></tr>';
  }).join('');
}

function filterProds(){
  var q=val('pSearch').toLowerCase(), cat=val('pCat');
  var prods=getProducts();
  if(q) prods=prods.filter(function(p){return p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q);});
  if(cat) prods=prods.filter(function(p){return p.category===cat;});
  set('prodBody',prodRows(prods));
}

// ─── PRODUCT FORM ─────────────────────────────────────────────────────────────
var EMOJIS=['🐕','🐈','🦜','🦎','🐠','🐹','🧩','🛏️','🪢','🍽️','🦮','📡','🪟','🚽','🪄','🏰','🔴','🏠','🌿','🎪','🪴','💡','🌡️','🐟','💎','🌀','📦','🎁','💊','🧴','🐇','🦔','🐢','🦩','🐾','🏆'];

function openAddProduct(){
  editingId=null; selectedEmoji='📦';
  document.getElementById('modalTitle').textContent='Add New Product';
  set('modalBody',buildForm({}));
  document.getElementById('productModal').classList.add('open');
}

function openEditProduct(id){
  var p=getProductById(id);
  if(!p) return;
  editingId=id; selectedEmoji=p.emoji||'📦';
  document.getElementById('modalTitle').textContent='Edit Product';
  set('modalBody',buildForm(p));
  document.getElementById('productModal').classList.add('open');
}

function buildForm(p){
  var emojiButtons=EMOJIS.map(function(e){
    return '<button type="button" class="emoji-opt'+(e===selectedEmoji?' selected':'')+'" onclick="pickEmoji(\''+e+'\',this)">'+e+'</button>';
  }).join('');

  var imgPreview=p.image
    ?'<img id="imgPrev" src="'+ea(p.image)+'" style="width:100%;height:100%;object-fit:cover">'
    :'<span id="imgPrevEmoji" style="font-size:2.8rem">'+esc(p.emoji||'📦')+'</span>';

  var catOpts=['dog','cat','bird','reptile','fish','small'].map(function(c){
    return '<option value="'+c+'"'+(p.category===c?' selected':'')+'>'+c.charAt(0).toUpperCase()+c.slice(1)+'</option>';
  }).join('');
  var typeOpts=['toys','beds','feeders','health','accessories','grooming','food'].map(function(t){
    return '<option value="'+t+'"'+(p.type===t?' selected':'')+'>'+t.charAt(0).toUpperCase()+t.slice(1)+'</option>';
  }).join('');
  var badgeOpts='<option value="">None</option>'
    +'<option value="hot"'+(p.badge==='hot'?' selected':'')+'>🔥 Hot</option>'
    +'<option value="new"'+(p.badge==='new'?' selected':'')+'>✨ New</option>'
    +'<option value="sale"'+(p.badge==='sale'?' selected':'')+'>💸 Sale</option>'
    +'<option value="top"'+(p.badge==='top'?' selected':'')+'>⭐ Top</option>';

  return ''
    +'<div class="product-form">'

    // ── IMAGE UPLOAD ──
    +'<div class="form-group full">'
      +'<label>Product Image</label>'
      +'<div style="display:flex;gap:16px;align-items:flex-start">'
        +'<div class="img-preview-box" id="imgPreviewBox">'+imgPreview+'</div>'
        +'<div style="flex:1;display:flex;flex-direction:column;gap:10px">'
          +'<label class="img-upload-btn">📁 Upload from Computer'
            +'<input type="file" id="imgFile" accept="image/*" style="display:none" onchange="handleUpload(this)">'
          +'</label>'
          +'<div style="display:flex;gap:8px">'
            +'<input type="text" id="imgUrl" placeholder="Or paste image URL (https://…)" value="'+(p.image&&!p.image.startsWith('data:')?ea(p.image):'')+'" style="flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.82rem;outline:none">'
            +'<button type="button" class="btn-admin-ghost" onclick="useUrl()">Use URL</button>'
          +'</div>'
          +(p.image?'<button type="button" onclick="clearImg()" style="background:#fee;color:var(--red);border:none;border-radius:8px;padding:6px 14px;font-size:.75rem;cursor:pointer;width:fit-content">✕ Remove image</button>':'')
          +'<p style="font-size:.72rem;color:var(--muted);margin:0">Upload a photo from your computer, or paste a direct image link. Shown on the storefront instead of the emoji.</p>'
        +'</div>'
      +'</div>'
      +'<input type="hidden" id="imgData" value="'+ea(p.image||'')+'">'
    +'</div>'

    // ── EMOJI FALLBACK ──
    +'<div class="form-group full">'
      +'<label>Fallback Emoji <span style="font-weight:300;color:var(--muted)">(shown if no image is set)</span></label>'
      +'<div class="emoji-picker-row">'+emojiButtons+'</div>'
      +'<input type="hidden" id="fEmoji" value="'+ea(p.emoji||'📦')+'">'
    +'</div>'

    // ── CORE FIELDS ──
    +'<div class="form-group full"><label>Product Name *</label><input type="text" id="fName" value="'+ea(p.name||'')+'" placeholder="e.g. Interactive Puzzle Feeder"></div>'

    +'<div class="form-group"><label>Category *</label><select id="fCat"><option value="">Select…</option>'+catOpts+'</select></div>'
    +'<div class="form-group"><label>Type</label><select id="fType"><option value="">Select…</option>'+typeOpts+'</select></div>'

    +'<div class="form-group"><label>Sale Price ($) *</label><input type="number" id="fPrice" step="0.01" min="0" value="'+ea(p.price||'')+'" placeholder="0.00"></div>'
    +'<div class="form-group"><label>Original Price ($) <span style="font-weight:300;color:var(--muted)">(optional — shows strikethrough)</span></label><input type="number" id="fOrig" step="0.01" min="0" value="'+ea(p.orig||'')+'" placeholder="0.00"></div>'

    +'<div class="form-group"><label>Stock Quantity *</label><input type="number" id="fStock" min="0" value="'+ea(p.stock!=null?p.stock:'')+'" placeholder="0"></div>'
    +'<div class="form-group"><label>Badge</label><select id="fBadge">'+badgeOpts+'</select></div>'

    +'<div class="form-group"><label>CJ Dropshipping SKU</label><input type="text" id="fSku" value="'+ea(p.cjdSku||'')+'" placeholder="e.g. CJD-DOG-PZL-001"></div>
      +'<div class="form-group"><label>CJ Product ID (PID) <a href="https://app.cjdropshipping.com" target="_blank" style="font-size:.7rem;color:var(--terra)">Find on CJ →</a></label>'
      +'<input type="text" id="fCjPid" value="'+ea(p.cj_pid||p.cjdSku||'')+'" placeholder="e.g. 92511400-C758-4474-93CA-66D442F5F787"></div>'
      +'<div class="form-group"><label>CJ Variant ID (VID) <span style="font-size:.7rem;color:var(--muted)">Optional — helps identify the exact variant on CJ</span></label>'
      +'<input type="text" id="fCjVid" value="'+ea(p.cj_vid||'')+'" placeholder="e.g. 92511400-C758-4474-93CA-66D442F5F787"></div>''
    +'<div class="form-group"><label>Rating (1–5)</label><input type="number" id="fRating" step="0.1" min="1" max="5" value="'+ea(p.rating||4.7)+'"></div>'

    +'<div class="form-group full"><label>Description</label><textarea id="fDesc" style="min-height:80px">'+esc(p.description||'')+'</textarea></div>'

// Image handling
function handleUpload(input){
  var file=input.files[0];
  if(!file) return;
  if(file.size>3*1024*1024){ showToast('Image too large — max 3MB','error'); return; }
  var reader=new FileReader();
  reader.onload=function(e){
    setPreview(e.target.result);
    document.getElementById('imgData').value=e.target.result;
    showToast('✅ Image loaded!');
  };
  reader.readAsDataURL(file);
}

function useUrl(){
  var u=val('imgUrl').trim();
  if(!u||!u.startsWith('http')){ showToast('Enter a valid https:// URL','error'); return; }
  setPreview(u);
  document.getElementById('imgData').value=u;
}

function setPreview(src){
  var box=document.getElementById('imgPreviewBox');
  if(!box) return;
  box.innerHTML='<img id="imgPrev" src="'+ea(src)+'" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML=\'<span style=color:var(--red);font-size:.75rem>Bad image</span>\'">';
}

function clearImg(){
  document.getElementById('imgData').value='';
  var box=document.getElementById('imgPreviewBox');
  if(box) box.innerHTML='<span style="font-size:2.8rem">'+esc(selectedEmoji)+'</span>';
  var urlEl=document.getElementById('imgUrl');
  if(urlEl) urlEl.value='';
}

function pickEmoji(e,btn){
  selectedEmoji=e;
  document.getElementById('fEmoji').value=e;
  document.querySelectorAll('.emoji-opt').forEach(function(b){ b.classList.remove('selected'); });
  btn.classList.add('selected');
  // Update preview if no image
  var imgData=val('imgData');
  if(!imgData){
    var box=document.getElementById('imgPreviewBox');
    if(box) box.innerHTML='<span style="font-size:2.8rem">'+e+'</span>';
  }
}

function saveProduct(){
  var name=val('fName').trim();
  var cat=val('fCat');
  var price=parseFloat(val('fPrice'));
  var stock=parseInt(val('fStock'));
  if(!name){ showToast('Product name is required','error'); return; }
  if(!cat){ showToast('Select a category','error'); return; }
  if(isNaN(price)||price<0){ showToast('Enter a valid price','error'); return; }
  if(isNaN(stock)||stock<0){ showToast('Enter a valid stock amount','error'); return; }

  var orig=parseFloat(val('fOrig'))||null;
  var img=val('imgData').trim()||null;
  var pd={
    name:name, category:cat,
    type:val('fType')||'',
    emoji:val('fEmoji')||selectedEmoji||'📦',
    image:img,
    price:price,
    orig:(orig&&orig>price?orig:null),
    stock:stock,
    badge:val('fBadge')||null,
    rating:parseFloat(val('fRating'))||4.7,
    cjdSku:val('fSku').trim()||'',
    cj_pid:val('fCjPid')||null,
    cj_vid:val('fCjVid')||null,
    description:val('fDesc').trim()||'',
    bg:'#f7f4ef',
  };

  var prods=getProducts();
  if(editingId){
    var idx=prods.findIndex(function(p){return p.id===editingId;});
    if(idx>=0){
      pd.reviews=prods[idx].reviews||0;
      pd.id=editingId;
      prods[idx]=pd;
    }
    showToast('✅ '+name+' updated!');
  } else {
    pd.id=genId('prod');
    pd.reviews=0;
    prods.push(pd);
    showToast('✅ '+name+' added!');
  }
  saveProducts(prods);
  closeModal('productModal');
  renderProducts();
}

function deleteProduct(id){
  var p=getProductById(id);
  if(!p||!confirm('Delete "'+p.name+'"? Cannot be undone.')) return;
  saveProducts(getProducts().filter(function(x){return x.id!==id;}));
  showToast('🗑️ Deleted');
  renderProducts();
}

function quickStock(id){
  var p=getProductById(id);
  if(!p) return;
  var v=prompt('Update stock for "'+p.name+'"\nCurrent: '+p.stock+'\n\nNew quantity:',p.stock);
  if(v===null) return;
  var n=parseInt(v);
  if(isNaN(n)||n<0){ showToast('Invalid quantity','error'); return; }
  var prods=getProducts();
  var idx=prods.findIndex(function(x){return x.id===id;});
  if(idx>=0){ prods[idx].stock=n; saveProducts(prods); }
  showToast('✅ Stock → '+n);
  var cur=document.getElementById('adminMain').id;
  if(document.getElementById('pr-'+id)||document.getElementById('invrow-'+id)) {
    // refresh whatever page is open
    var active=document.querySelector('.admin-nav-item.active');
    if(active) { var pg=active.id.replace('nav-',''); nav(pg); }
  }
}

function setStock(id){
  var n=parseInt(val('inv-'+id));
  if(isNaN(n)||n<0){ showToast('Invalid quantity','error'); return; }
  var prods=getProducts();
  var idx=prods.findIndex(function(x){return x.id===id;});
  if(idx>=0){ prods[idx].stock=n; saveProducts(prods); }
  showToast('✅ Stock → '+n);
  renderInventory();
}

function adjustStock(id,delta){
  var prods=getProducts();
  var idx=prods.findIndex(function(x){return x.id===id;});
  if(idx<0) return;
  prods[idx].stock=Math.max(0,prods[idx].stock+delta);
  saveProducts(prods);
  var inp=document.getElementById('inv-'+id);
  if(inp) inp.value=prods[idx].stock;
  showToast('Stock '+(delta>0?'+':'')+delta);
}

// ─── FULFILL MODAL (step-by-step CJ guide for a specific order) ───────────────
function openFulfillModal(id){
  // Load order — try server first, fall back to localStorage
  if(_serverUp){
    apiGet('/api/orders/'+id).then(function(data){
      if(data.result) buildFulfillModal(data.order);
      else buildFulfillModalLocal(id);
    }).catch(function(){ buildFulfillModalLocal(id); });
  } else {
    buildFulfillModalLocal(id);
  }
}

// alias used from fulfillment page
window.openFulfillPanel = openFulfillModal;

function buildFulfillModalLocal(id){
  var o=getOrders().find(function(x){return x.id===id;});
  if(!o) return;
  // Normalise field names
  o.customer_name = o.customer_name || o.customer;
  o.phone         = o.phone || '—';
  o.address2      = o.address2 || '';
  o.province      = o.province || '';
  o.zip           = o.zip || '';
  o.country_code  = o.country_code || 'US';
  // Parse address from single string if needed
  if(!o.city && o.address && o.address.includes(',')) {
    var parts=o.address.split(',');
    o.address  = parts[0].trim();
    o.city     = parts[1] ? parts[1].trim() : '';
    o.province = parts[2] ? parts[2].trim() : '';
    o.country_code = parts[3] ? parts[3].trim() : 'US';
  }
  o.items = typeof o.items==='string' ? JSON.parse(o.items) : o.items;
  buildFulfillModal(o);
}

function buildFulfillModal(o){
  var items = typeof o.items==='string' ? JSON.parse(o.items) : (o.items||[]);

  // Build full formatted address string for CJ
  var addrParts = [
    o.address,
    o.address2||'',
    o.city,
    o.province||'',
    o.zip||'',
    o.country_code||o.country||'',
  ].filter(Boolean);
  var fullAddr = addrParts.join(', ');

  // Per-item CJ info
  var itemRows = items.map(function(it){
    var p = getProductById(it.id) || {};
    var cjPid = it.cj_pid || p.cj_pid || p.cjdSku || null;
    var cjVid = it.cj_vid || p.cj_vid || null;
    var cjUrl = cjPid ? 'https://app.cjdropshipping.com/product-detail.html?id='+cjPid : null;
    var hasLink = !!cjPid;
    var thumb = (it.image||p.image)
      ? '<img src="'+ea(it.image||p.image)+'" style="width:100%;height:100%;object-fit:cover">'
      : (p.emoji||it.emoji||'📦');
    return '<div style="background:var(--cream);border-radius:12px;padding:14px 16px;margin-bottom:10px">'
      +'<div style="display:flex;gap:12px;align-items:flex-start">'
        +'<div style="width:48px;height:48px;border-radius:8px;overflow:hidden;background:var(--cream2);display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0">'+thumb+'</div>'
        +'<div style="flex:1;min-width:0">'
          +'<div style="font-weight:600;font-size:.88rem;margin-bottom:6px">'+esc(it.name)+' <span style="color:var(--terra)">× '+it.qty+'</span></div>'
          +'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">'
            +(cjPid
              ? '<div style="display:flex;align-items:center;gap:5px;background:#fff;border:1px solid var(--border2);border-radius:6px;padding:4px 8px;font-size:.72rem">'
                  +'<span style="color:var(--muted)">CJ PID:</span>'
                  +'<strong style="font-family:monospace">'+esc(cjPid)+'</strong>'
                  +'<button class="copy-btn" onclick="copyText(\''+ea(cjPid)+'\')">Copy</button>'
                +'</div>'
              : '<div style="background:#fef3e8;border:1px solid #f0ad00;border-radius:6px;padding:4px 8px;font-size:.72rem;color:#7a4400">⚠️ No CJ PID — <button onclick="nav(\'products\')" style="background:none;border:none;color:var(--terra);cursor:pointer;font-size:.72rem;text-decoration:underline">edit product</button></div>'

async function saveFulfillment(id){
  var track = val('fulfillTrack').trim();
  if(!track){ showToast('Enter the tracking number from CJ','error'); return; }

  // Try server first
  if(_serverUp){
    try{
      var r = await apiPut('/api/admin/orders/'+id, {status:'shipped', tracking:track});
      if(r.result){ showToast('✅ Order '+id+' marked shipped · '+track); closeModal('orderModal'); renderOrders(); return; }
    }catch(e){}
  }
  // Fallback localStorage
  var ords=getOrders();
  var idx=ords.findIndex(function(o){return o.id===id;});
  if(idx>=0){ ords[idx].tracking=track; ords[idx].status='shipped'; saveOrders(ords); }
  showToast('✅ Marked shipped · '+track);
  closeModal('orderModal');
  renderOrders();
}

function copyText(txt){navigator.clipboard.writeText(txt).then(function(){showToast("Copied!");}).catch(function(){showToast("Copy failed","error");});}

// Opens an order modal with ALL info needed to submit to CJ manually.
async function openFulfillPanel(orderId){

  var o=null;
  if(_serverUp){

      var data=await apiGet('/api/orders/'+orderId);
      if(data.result) o=data.order;

  }
  if(!o){
    // Try localStorage
    var localOrds=getOrders();
    o=localOrds.find(function(x){return x.id===orderId;});
    if(o){
      o.customer_name=o.customer||o.customer_name;
      o.phone=o.phone||'';
      o.address=o.address||'';
      o.address2=o.address2||'';
      o.city=o.city||'';

  var items=typeof o.items==='string'?JSON.parse(o.items):o.items;

  document.getElementById('orderModalTitle').textContent='Fulfill Order '+o.id+' on CJ';

  // Build a copyable field helper

  // Format full address for CJ
  var fullAddress=[o.address,o.address2].filter(Boolean).join(', ');

  // Build items section
  var itemsHtml=items.map(function(it,i){
    var p=getProductById(it.id)||{};

async function markShipped(orderId){
  var tracking=val('fulfillTrack').trim();
  if(!tracking){showToast('Enter the tracking number from CJ','error');return;}

  if(_serverUp){
    try{
      await apiPut('/api/admin/orders/'+orderId,{status:'shipped',tracking:tracking});
    }catch(e){}
  }
  // Also update localStorage
  var ords=getOrders();
  var idx=ords.findIndex(function(x){return x.id===orderId;});
  if(idx>=0){ords[idx].tracking=tracking;ords[idx].status='shipped';saveOrders(ords);}

  showToast('✅ Order marked shipped — tracking: '+tracking);
  closeModal('orderModal');
  nav('orders');
}

// ─── CUSTOMERS ────────────────────────────────────────────────────────────────
function renderCustomers(){
  var ords=getOrders();
  var map={};
  ords.forEach(function(o){
    if(!map[o.email]) map[o.email]={name:o.customer,email:o.email,orders:0,spent:0};
    map[o.email].orders++;
    map[o.email].spent+=o.total;
  });
  var custs=Object.values(map).sort(function(a,b){return b.spent-a.spent;});
  var rows=custs.map(function(c){
    var badge=c.orders>2?'VIP':c.orders>1?'Returning':'New';
    var bc=c.orders>2?'in':c.orders>1?'in':'low';
    return '<tr><td><strong>'+esc(c.name)+'</strong></td><td>'+esc(c.email)+'</td>'
      +'<td>'+c.orders+'</td><td><strong>'+formatPrice(c.spent)+'</strong></td>'
      +'<td><span class="stock-badge '+bc+'">'+badge+'</span></td></tr>';
  }).join('');
  document.getElementById('adminMain').innerHTML=
    '<h1 class="admin-page-title">Customers</h1>'
    +'<div class="admin-stats" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">'
      +'<div class="admin-stat-card"><div class="asc-label">Total Customers</div><div class="asc-num">'+custs.length+'</div></div>'
      +'<div class="admin-stat-card"><div class="asc-label">Avg Order Value</div><div class="asc-num">'+formatPrice(ords.reduce(function(s,o){return s+o.total;},0)/Math.max(ords.length,1))+'</div></div>'
      +'<div class="admin-stat-card"><div class="asc-label">Returning</div><div class="asc-num">'+custs.filter(function(c){return c.orders>1;}).length+'</div></div>'
    +'</div>'
    +'<div class="admin-card"><table class="admin-table"><thead><tr>'
      +'<th>Name</th><th>Email</th><th>Orders</th><th>Total Spent</th><th>Type</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

    +'<div class="admin-card"><div class="admin-card-header"><h3>Store Information</h3></div><div class="admin-card-body">'

        +'<div class="form-group"><label>Contact Email</label><input type="email" id="sEmail" value="'+ea(s.email)+'"></div>'
        +'<div class="form-group"><label>Free Shipping Threshold ($)</label><input type="number" id="sFree" value="'+s.freeShipThreshold+'" min="0"></div>'
        +'<div class="form-group"><label>Tax Rate (%)</label><input type="number" id="sTax" value="'+s.taxRate+'" min="0" max="100" step="0.1"></div>'
        +'<div class="form-group"><label>Currency</label><select id="sCur">'+curOpts+'</select></div>'
        +'<div class="form-actions"><button class="btn-admin" onclick="saveStore()">💾 Save</button></div>'
      +'</div>'
    +'</div></div>'

    +'<div class="admin-card"><div class="admin-card-header"><h3>Payment Keys</h3></div><div class="admin-card-body">'
      +'<div class="product-form" style="grid-template-columns:1fr">'
        +'<div class="form-group"><label>Stripe Publishable Key</label><input type="password" id="sStripe" value="'+ea(s.stripeKey||'')+'" placeholder="pk_live_…"></div>'
        +'<div class="form-group"><label>PayPal Client ID</label><input type="password" id="sPaypal" value="'+ea(s.paypalId||'')+'" placeholder="Client ID…"></div>'
        +'<p style="font-size:.75rem;color:var(--muted)">Stored locally. Wire to a payment processor before going live.</p>'
        +'<div class="form-actions"><button class="btn-admin" onclick="savePayment()">💾 Save</button></div>'
      +'</div>'

    +'<div class="admin-card"><div class="admin-card-header"><h3>Store Stats</h3></div><div class="admin-card-body">'

        }).join('')
      +'</div>'
    +'</div></div>'

    +'<div class="admin-card"><div class="admin-card-header"><h3>Data & Backup</h3></div><div class="admin-card-body" style="display:flex;flex-direction:column;gap:10px">'
      +'<button class="btn-admin-ghost" onclick="exportData()">📥 Export All Data (JSON)</button>'
      +'<button class="btn-admin-ghost" onclick="importData()">📤 Import Data (JSON)</button>'
      +'<button class="btn-admin btn-danger" onclick="resetProds()">🔄 Reset Products to Defaults</button>'
      +'<p style="font-size:.72rem;color:var(--muted)">Data lives in browser localStorage. Export regularly — clearing browser data will wipe it.</p>'

function saveStore(){
  var s=getSettings();
  s.storeName=val('sName'); s.tagline=val('sTagline'); s.email=val('sEmail');
  s.freeShipThreshold=parseFloat(val('sFree'))||35;
  s.taxRate=parseFloat(val('sTax'))||0;
  s.currency=val('sCur');
  saveSettings(s); showToast('✅ Settings saved!');
}
function savePayment(){
  var s=getSettings();
  s.stripeKey=val('sStripe').trim(); s.paypalId=val('sPaypal').trim();
  saveSettings(s); showToast('✅ Payment keys saved!');
}
function exportData(){
  var d={products:getProducts(),orders:getOrders(),settings:getSettings(),exported:new Date().toISOString()};
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'}));
  a.download='crittrly-backup-'+new Date().toISOString().split('T')[0]+'.json';
  a.click(); showToast('✅ Exported!');
}
function importData(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=function(e){
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var d=JSON.parse(ev.target.result);
        if(d.products) saveProducts(d.products);
        if(d.orders) saveOrders(d.orders);
        if(d.settings) saveSettings(d.settings);
        showToast('✅ Imported!'); renderSettings();
      }catch(err){ showToast('Invalid JSON file','error'); }
    };
    r.readAsText(f);
  };
  inp.click();
}
function resetProds(){
  if(!confirm('Reset all products to defaults? Custom products and images will be lost.')) return;
  saveProducts(DEFAULT_PRODUCTS); showToast('✅ Reset to defaults'); renderSettings();
}

async function updateServerStatus(id,status){
  if(!_serverUp){updateStatus(id,status);return;}
  await apiPut('/api/admin/orders/'+id,{status:status});
  showToast('Updated '+id+' → '+status);
}

        +'<div>'+esc(it.name)+' × '+it.qty+(it.cj_pid?'<br><code style="font-size:.65rem;color:var(--muted2)">PID:'+esc(it.cj_pid)+(it.cj_vid?' VID:'+esc(it.cj_vid):'')+'</code>':'')+'</div>'
