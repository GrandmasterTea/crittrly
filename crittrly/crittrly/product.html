<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product – Crittrly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=4">
<style>
.product-detail { display:grid; grid-template-columns:1fr 1fr; gap:60px; padding:60px 0 80px; align-items:start; }
.product-detail-img { border-radius:24px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:10rem; aspect-ratio:1; position:sticky; top:80px; }
.pd-eyebrow { font-size:.7rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--orange); margin-bottom:12px; }
.pd-title { font-family:'Unbounded',sans-serif; font-size:1.8rem; font-weight:900; letter-spacing:-.03em; line-height:1.15; margin-bottom:14px; }
.pd-rating { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
.pd-price { font-family:'Unbounded',sans-serif; font-size:2rem; font-weight:900; color:var(--ink); margin-bottom:4px; }
.pd-orig { font-size:.9rem; color:var(--muted); text-decoration:line-through; margin-bottom:20px; }
.pd-desc { font-size:.9rem; color:var(--muted); line-height:1.75; margin-bottom:24px; font-weight:300; }
.pd-stock { font-size:.82rem; font-weight:700; margin-bottom:20px; }
.pd-qty { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.pd-qty-btn { width:36px; height:36px; border-radius:8px; background:var(--surface); border:1.5px solid var(--border); font-size:1.1rem; font-weight:700;  transition:all .2s; }
.pd-qty-btn:hover { background:var(--ink); color:#fff; border-color:var(--ink); }
.pd-qty-num { font-family:'Unbounded',sans-serif; font-size:1.1rem; font-weight:800; min-width:32px; text-align:center; }
.pd-actions { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; }
.pd-meta { display:flex; flex-direction:column; gap:8px; border-top:1px solid var(--border); padding-top:20px; }
.pd-meta-row { display:flex; gap:8px; font-size:.8rem; }
.pd-meta-label { color:var(--muted); font-weight:500; min-width:120px; }
.pd-meta-val { color:var(--ink); font-weight:600; }
.related-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-top:20px; }
</style>
</head>
<body>
<div class="announce-bar" id="announceBar"><span>🎉 Use code <strong>CRITTRLY15</strong> for 15% off your first order</span><button class="announce-close" onclick="this.closest('.announce-bar').style.display='none'">✕</button></div>
<nav id="mainNav">
  <a href="index.html" class="logo"><div class="logo-dot"></div>Crittrly</a>
  <ul class="nav-links">
    <li><a href="shop.html">Shop</a></li>
    <li><a href="shop.html?collection=new">New Arrivals</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="tracking.html">Track Order</a></li>
  </ul>
  <div class="nav-right">
    <div class="nav-search-wrap"><button class="icon-btn" onclick="toggleSearch()">🔍</button><div class="search-dropdown" id="searchDropdown"><input type="text" id="siteSearch" placeholder="Search..." oninput="handleSearch(this.value)"><div class="search-results" id="searchResults"></div></div></div>
    <a href="wishlist.html" class="icon-btn">♡ <span id="wishlistCount" class="nav-badge">0</span></a>
    <button class="cart-btn" onclick="openCart()">🛒 Cart <span class="cart-count" id="cartCount">0</span></button>
  </div>
</nav>

<div class="container" id="productContent">
  <div style="padding:60px;text-align:center;color:var(--muted);">Loading product...</div>
</div>

<section style="background:var(--surface2);padding:64px 0;" id="relatedSection" style="display:none;">
  <div class="container">
    <div class="eyebrow">You may also like</div>
    <h2>Related Products</h2>
    <div class="related-grid" id="relatedGrid"></div>
  </div>
</section>

<footer style="background:var(--ink);padding:32px 0;">
  <div class="container footer-bottom-inner" style="border:none;padding-top:0;">
    <p style="color:rgba(255,255,255,.35);font-size:.78rem;">© 2025 Crittrly.com · <a href="index.html" style="color:var(--orange);">← Back to Store</a></p>
    
  </div>
</footer>

<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-drawer-head"><h3>Your Cart 🛒</h3><button class="close-btn" onclick="closeCart()">✕</button></div>
  <div class="cart-drawer-body" id="cartBody"></div>
  <div class="cart-drawer-foot" id="cartFoot"></div>
</div>
<div class="toast" id="toast"><span class="toast-dot" id="toastDot"></span><span id="toastMsg"></span></div>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
let qty = 1;

function adjustQty(d) {
  qty = Math.max(1, Math.min(99, qty + d));
  document.getElementById('pdQty').textContent = qty;
}

(function loadProduct() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const product = id ? getProductById(id) : null;

  // If not in local store, try CJ live data
  if (!product && id && cjServerUp !== false) {
    CJ.isServerUp().then(up => {
      if (!up) { showNotFound(id); return; }
      CJ.getProduct(id).then(cjp => {
        if (!cjp) { showNotFound(id); return; }
        renderCJProductDetail(cjp);
      });
    });
    return;
  }
  if (!product) {
    document.getElementById('productContent').innerHTML = `<div style="text-align:center;padding:80px;"><div style="font-size:3rem;">🔍</div><h2>Product not found</h2><a href="shop.html" class="btn-primary" style="display:inline-flex;margin-top:20px;">Browse All Products</a></div>`;
    return;
  }

  document.title = `${product.name} – Crittrly`;

  const wishlisted = isWishlisted(product.id);
  const savings = product.orig ? (product.orig - product.price).toFixed(2) : null;

  document.getElementById('productContent').innerHTML = `
    <div class="shop-breadcrumb" style="padding:20px 0 0;"><a href="index.html">Home</a> → <a href="shop.html">Shop</a> → <a href="shop.html?cat=${product.category}">${product.category}</a> → ${product.name}</div>
    <div class="product-detail">
      <div class="product-detail-img" style="background:${product.image ? '#fff' : (product.bg||'#f7f4ef')};padding:0;overflow:hidden;">
        ${product.image
          ? `<img src="${product.image}" alt="${product.name}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<span style=font-size:10rem;display:flex;align-items:center;justify-content:center;width:100%;height:100%;>${product.emoji}</span>')">`
          : `<span style="font-size:10rem;display:flex;align-items:center;justify-content:center;width:100%;height:100%;">${product.emoji}</span>`
        }
      </div>
      <div>
        <div class="pd-eyebrow">${product.category} · ${product.type || 'Pet Supply'}</div>
        <h1 class="pd-title">${product.name}</h1>
        <div class="pd-rating">
          <span class="stars" style="font-size:1rem;">${'★'.repeat(Math.floor(product.rating))}${'☆'.repeat(5-Math.floor(product.rating))}</span>
          <span style="font-size:.85rem;font-weight:600;">${product.rating}</span>
          <span style="font-size:.82rem;color:var(--muted);">(${product.reviews} reviews)</span>
        </div>
        <div class="pd-price">${formatPrice(product.price)}</div>
        ${product.orig ? `<div class="pd-orig">Was ${formatPrice(product.orig)} · You save ${formatPrice(savings)}!</div>` : '<div style="margin-bottom:20px;"></div>'}
        <p class="pd-desc">${product.description || 'Premium quality pet product, carefully selected for your pet.'}</p>
        <div class="pd-stock" style="color:${product.stock>20?'var(--green)':product.stock>5?'#b36200':'var(--red)'}">
          ${product.stock>20?`✓ In Stock (${product.stock} available)`:product.stock>5?`⚠ Only ${product.stock} left — order soon!`:product.stock===0?'✗ Out of Stock':'⚠ Last few remaining!'}
        </div>
        <div class="pd-qty">
          <button class="pd-qty-btn" onclick="adjustQty(-1)">−</button>
          <span class="pd-qty-num" id="pdQty">1</span>
          <button class="pd-qty-btn" onclick="adjustQty(1)">+</button>
          <span style="font-size:.78rem;color:var(--muted);">units</span>
        </div>
        <div class="pd-actions">
          <button class="btn-primary" style="flex:1;" onclick="addToCart('${product.id}',qty)" ${product.stock===0?'disabled style="opacity:.5"':''}>
            ${product.stock===0?'Out of Stock':'Add to Cart →'}
          </button>
          <button class="p-wishlist ${wishlisted?'active':''}" data-wishlist="${product.id}" onclick="toggleWishlist('${product.id}')" style="position:static;opacity:1;width:52px;height:52px;border:1.5px solid var(--border);border-radius:50%;background:#fff;font-size:1.2rem;">
            ${wishlisted?'♥':'♡'}
          </button>
        </div>
        <div class="pd-meta">
          <div class="pd-meta-row"><span class="pd-meta-label">SKU:</span><span class="pd-meta-val"><code>${product.cjdSku||'N/A'}</code></span></div>
          <div class="pd-meta-row"><span class="pd-meta-label">Fulfilled by:</span><span class="pd-meta-val">Crittrly Logistics</span></div><div class="pd-meta-row"><span class="pd-meta-label">Fulfilled by: Crittrly</span></div>
          <div class="pd-meta-row"><span class="pd-meta-label">Delivery:</span><span class="pd-meta-val">7–14 business days, tracked</span></div>
          <div class="pd-meta-row"><span class="pd-meta-label">Returns:</span><span class="pd-meta-val">30-day hassle-free returns</span></div>
          <div class="pd-meta-row"><span class="pd-meta-label">Ships from:</span><span class="pd-meta-val">Nearest CJ warehouse</span></div>
        </div>
      </div>
    </div>
  `;

  // Related products
  const related = getProducts().filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
  if (related.length > 0) {
    document.getElementById('relatedSection').style.display = 'block';
    document.getElementById('relatedGrid').innerHTML = related.map(p => renderProductCard(p)).join('');
  }
})();
</script>
</body>
</html>
